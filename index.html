<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganizAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header class="app-header">
        <div>
            <h1 class="app-title">OrganizAI</h1>
            <h2 id="mesAtual" class="app-subtitle"></h2>
        </div>
        <div class="theme-switcher">
            <span class="theme-switcher-label">Tema</span>
            <div class="theme-select-shell">
                <div class="theme-select-inner">
                    <span class="theme-dot"></span>
                    <select id="themeSelect" onchange="changeTheme(this.value)">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                        <option value="forest">Forest</option>
                        <option value="ocean">Ocean</option>
                    </select>
                    <span class="theme-arrow">⌄</span>
                </div>
            </div>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Progresso do Mês</span>
            <span class="stat-value" id="porcentagem">0%</span>
            <div class="barra-container">
                <div id="barraProgresso"></div>
            </div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Metas Completas</span>
            <span class="stat-value" id="metasCompletas">0</span>
            <span class="stat-sub">de <span id="totalMetas">0</span> metas</span>
        </div>
    </div>

    <div class="input-card">
        <input type="text" id="novaTarefa" placeholder="Nova meta para o mês..." />
        <button onclick="adicionarTarefa()">+ Adicionar</button>
    </div>

    <div id="tabelaContainer" class="tabela-wrapper"></div>
</div>

<!-- Modal de Edição -->
<div id="modalOverlay" class="modal-overlay" onclick="fecharModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <h3>Editar Meta</h3>
        <input type="text" id="modalInput" placeholder="Nome da meta" />
        <div class="modal-actions">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-confirm" onclick="confirmarEdicao()">Salvar</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toastContainer" class="toast-container"></div>

<script src="script.js"></script>
</body>
</html>
